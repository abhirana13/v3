name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-id i-09bbb87968beb953a \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters 'commands=[
              "set -e",
              "export HOME=/root",
              "git config --global --add safe.directory /opt/tools/analytics-dashboard",
              "cd /opt/tools/analytics-dashboard",
              "git pull origin main",
              "mkdir -p /usr/local/lib/docker/cli-plugins",
              "curl -sL https://github.com/docker/buildx/releases/download/v0.35.0/buildx-v0.35.0.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx",
              "chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx",
              "docker compose -f docker-compose.prod.yml up --build -d",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-09bbb87968beb953a \
              --query "Status" \
              --output text)
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then break; fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id i-09bbb87968beb953a \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-09bbb87968beb953a \
            --query "StandardOutputContent" \
            --output text
