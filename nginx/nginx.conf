server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ALB / internal health check — no auth required
    location /_nginx_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Docker's internal DNS — resolves service names at request time, not startup.
    # Without this, nginx refuses to start if 'backend' isn't yet resolvable.
    resolver 127.0.0.11 valid=10s;

    # Proxy /api/* to FastAPI backend, stripping the /api prefix.
    # Mirrors the Vite dev proxy so frontend api/client.ts works unchanged.
    # Regex captures path after /api so we can construct the upstream URL directly,
    # avoiding the rewrite+variable ordering issue in nginx.
    location ~ ^/api/(.*)$ {
        set $upstream      http://backend:8000;
        proxy_pass         $upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA catch-all — all non-file routes serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
